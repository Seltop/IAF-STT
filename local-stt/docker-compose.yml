services:
  local-stt:
    build:
      context: .
    image: iaf-local-stt:caspi
    ports:
      - "8011:8011"
    environment:
      LOCAL_STT_HOST: "0.0.0.0"
      LOCAL_STT_PORT: "8011"
      LOCAL_STT_MODEL: "OzLabs/Caspi-1.7B"
      LOCAL_STT_LANGUAGE: "Hebrew"
      LOCAL_STT_GPU_MEMORY_UTILIZATION: "0.9"
      LOCAL_STT_CONFIRMATION_ENABLED: "true"
      LOCAL_STT_ROLLING_BUFFER_SECONDS: "20"
      LOCAL_STT_MAX_NEW_TOKENS: "32"
      LOCAL_STT_UNFIXED_CHUNK_NUM: "2"
      LOCAL_STT_UNFIXED_TOKEN_NUM: "5"
      LOCAL_STT_CHUNK_SIZE_SEC: "2.0"
      HF_HOME: "/models/huggingface"
    volumes:
      - local-stt-models:/models
    gpus: all

volumes:
  local-stt-models:
